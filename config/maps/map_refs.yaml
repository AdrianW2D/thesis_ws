# NOTE:
# - This file is the thesis-side map index for Task2 and later tasks.
# - Fields such as path_repo_relative describe local bookkeeping inside the
#   current repository and must not be treated as runtime deployment paths.
# - runtime_map_path is the deployment-side path hint used by thesis helper
#   scripts on the industrial PC.

active_map_id: "task1_lab_v01"

maps:
  reference_map:
    source_workspace: catkin_ws
    editable: false
    kind: upstream_baseline
    path_repo_relative: catkin_ws/src/scout_base/scout_description/maps/map.yaml
    note: Local platform-baseline record of an upstream map. Thesis uses it by reference, not by internal path coupling.

  reference_map_test1:
    source_workspace: catkin_ws
    editable: false
    kind: upstream_baseline
    path_repo_relative: catkin_ws/src/scout_base/scout_description/maps/map_test1.yaml
    note: Local platform-baseline record of a historical upstream map. Thesis uses it by reference, not by internal path coupling.

  task1_lab_v01:
    source_workspace: thesis_ws
    editable: true
    kind: thesis_generated
    path_repo_relative: thesis_ws/maps/generated/task1_lab_v01.yaml
    runtime_map_path: "$HOME/thesis_ws/maps/generated/task1_lab_v01.yaml"
    note: Current thesis-owned map generated by Task1 and used as the default Task2 navigation map while active_map_id points here.

  thesis_generated_placeholder:
    source_workspace: thesis_ws
    editable: true
    kind: thesis_generated
    path_repo_relative: thesis_ws/maps/generated/
    note: Thesis-owned map output location. Runtime should prefer thesis-managed map assets.
