# NOTE:
# - Fields ending in _repo_relative are local repository index fields.
# - They document where assets live in the current repository view, but they
#   are not intended to become runtime path assumptions on the deployed robot.
# - Runtime orchestration should resolve launch/config/task assets from the
#   deployed thesis_ws and the system catkin_ws environment.

profiles:
  mapping_demo:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task1_mapping_session.launch
    bag_output_repo_relative: thesis_ws/bags/mapping/
    result_output_repo_relative: thesis_ws/results/mapping/
    map_output_repo_relative: thesis_ws/maps/generated/
    map_save_script_repo_relative: thesis_ws/scripts/save_task1_map.sh
    record_topics:
      - /scan
      - /tf
      - /tf_static
      - /odom
      - /map
    note: Local repository profile for task 1 bookkeeping; runtime should use the deployed thesis_ws layout.

  single_goal_nav:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task2_single_goal_nav.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task2_active_map.sh
    map_ref_config_repo_relative: thesis_ws/config/maps/map_refs.yaml
    active_map_id: task1_lab_v01
    bag_output_repo_relative: thesis_ws/bags/navigation/
    result_output_repo_relative: thesis_ws/results/navigation/
    record_topics:
      - /map
      - /odom
      - /scan
      - /amcl_pose
      - /move_base_simple/goal
      - /move_base/status
      - /move_base/GlobalPlanner/plan
      - /move_base/DWAPlannerROS/local_plan
      - /cmd_vel
    note: Local repository profile for task 2 bookkeeping; runtime should use the deployed thesis_ws layout.

  patrol_stub:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task3_patrol_stub.launch
    task_file_repo_relative: thesis_ws/tasks/waypoint_sets/patrol_seed.yaml
    bag_output_repo_relative: thesis_ws/bags/patrol/
    result_output_repo_relative: thesis_ws/results/patrol/
    record_topics:
      - /map
      - /odom
      - /scan
      - /move_base/status
      - /cmd_vel
    note: Local repository profile for task 3 bookkeeping; runtime should use the deployed thesis_ws layout.

  line1_scan_frontend_mapping_baseline:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task1_mapping_session.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task1_scan_frontend_experiment.sh
    scan_variant: baseline
    use_scan_enhancer: false
    scan_output_topic: /scan
    scan_param_file_repo_relative: thesis_ws/config/overlays/sensing/scan_enhancer_baseline.yaml
    bag_output_repo_relative: thesis_ws/bags/mapping/
    result_output_repo_relative: thesis_ws/results/mapping/
    record_topics:
      - /scan
      - /scan_thesis
      - /tf
      - /tf_static
      - /odom
      - /map
    note: Baseline profile for experiment line 1. Mapping consumes raw scan directly.

  line1_scan_frontend_mapping_enhanced:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task1_mapping_session.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task1_scan_frontend_experiment.sh
    scan_variant: enhanced
    use_scan_enhancer: true
    scan_output_topic: /scan_thesis
    scan_param_file_repo_relative: thesis_ws/config/overlays/sensing/scan_enhancer_enhanced.yaml
    bag_output_repo_relative: thesis_ws/bags/mapping/
    result_output_repo_relative: thesis_ws/results/mapping/
    record_topics:
      - /scan
      - /scan_thesis
      - /tf
      - /tf_static
      - /odom
      - /map
    note: Enhanced profile for experiment line 1. Mapping consumes thesis-enhanced scan topic.

  line1_scan_frontend_task2_baseline:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task2_single_goal_nav.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task2_scan_frontend_experiment.sh
    map_ref_config_repo_relative: thesis_ws/config/maps/map_refs.yaml
    scan_variant: baseline
    use_scan_enhancer: false
    scan_output_topic: /scan
    scan_param_file_repo_relative: thesis_ws/config/overlays/sensing/scan_enhancer_baseline.yaml
    bag_output_repo_relative: thesis_ws/bags/navigation/
    result_output_repo_relative: thesis_ws/results/navigation/
    record_topics:
      - /map
      - /odom
      - /scan
      - /scan_thesis
      - /amcl_pose
      - /move_base/status
      - /move_base/GlobalPlanner/plan
      - /move_base/DWAPlannerROS/local_plan
      - /cmd_vel
    note: Baseline navigation validation profile for experiment line 1.

  line1_scan_frontend_task2_enhanced:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task2_single_goal_nav.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task2_scan_frontend_experiment.sh
    map_ref_config_repo_relative: thesis_ws/config/maps/map_refs.yaml
    scan_variant: enhanced
    use_scan_enhancer: true
    scan_output_topic: /scan_thesis
    scan_param_file_repo_relative: thesis_ws/config/overlays/sensing/scan_enhancer_enhanced.yaml
    bag_output_repo_relative: thesis_ws/bags/navigation/
    result_output_repo_relative: thesis_ws/results/navigation/
    record_topics:
      - /map
      - /odom
      - /scan
      - /scan_thesis
      - /amcl_pose
      - /move_base/status
      - /move_base/GlobalPlanner/plan
      - /move_base/DWAPlannerROS/local_plan
      - /cmd_vel
    note: Enhanced navigation validation profile for experiment line 1.

  line2_execution_baseline:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task3_patrol_stub.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task3_execution_experiment.sh
    manager_param_file_repo_relative: thesis_ws/config/tasks/patrol_manager_line2_baseline.yaml
    result_output_repo_relative: thesis_ws/results/patrol/
    record_topics:
      - /map
      - /odom
      - /scan
      - /amcl_pose
      - /move_base/status
      - /cmd_vel
    note: Baseline profile for experiment line 2. Direct task execution with minimal recovery logic.

  line2_execution_enhanced:
    scenario_launch_repo_relative: thesis_ws/launch/scenarios/task3_patrol_stub.launch
    launcher_script_repo_relative: thesis_ws/scripts/run_task3_execution_experiment.sh
    manager_param_file_repo_relative: thesis_ws/config/tasks/patrol_manager_line2_enhanced.yaml
    result_output_repo_relative: thesis_ws/results/patrol/
    record_topics:
      - /map
      - /odom
      - /scan
      - /amcl_pose
      - /move_base/status
      - /cmd_vel
    note: Enhanced profile for experiment line 2. Thesis execution manager enables stage control, progress monitor and recovery.
